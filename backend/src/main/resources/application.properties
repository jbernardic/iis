spring.application.name=iis-backend
server.port=8080

# --- H2 database (in-memory, kept alive for the whole JVM run) ---
spring.datasource.url=jdbc:h2:mem:iis;DB_CLOSE_DELAY=-1
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false

# --- JWT (Part 5): access + refresh tokens (HS256) ---
# Base64 of a 48-byte random secret. Override in production.
app.jwt.secret=Y2hhbmdlLW1lLXRoaXMtaXMtYS1kZW1vLXNlY3JldC1mb3ItaWlzLXByb2plY3QtMTIzNDU2Nzg=
app.jwt.access-token-ttl-minutes=15
app.jwt.refresh-token-ttl-days=7

# --- Order source switch (Part 5): custom = local DB, woocommerce = public REST API ---
app.order-source=custom

# --- WooCommerce public REST API (used only when app.order-source=woocommerce) ---
# Fill these from WordPress > WooCommerce > Settings > Advanced > REST API.
app.woocommerce.base-url=https://your-store.example.com
app.woocommerce.consumer-key=ck_xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx
app.woocommerce.consumer-secret=cs_xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx

# --- gRPC server (Part 4) ---
app.grpc.port=9090

# --- DHMZ source (Part 4) ---
app.dhmz.url=https://vrijeme.hr/hrvatska_n.xml

# --- Prepared XML file (Parts 2 & 3) ---
app.xml.orders-file=data/orders-data.xml

# --- GraphQL (Part 5) ---
spring.graphql.graphiql.enabled=true
spring.graphql.schema.printer.enabled=true

# --- Spring Web Services (Part 2) ---
# MessageDispatcherServlet is mapped at /ws/* (see SoapConfig).

logging.level.com.example.iis=INFO
